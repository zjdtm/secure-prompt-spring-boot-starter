name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*.*.*'   # v1.0.0, v1.1.0 등 버전 태그 push 시 자동 실행

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew test

      # GitHub Secrets 등록 여부 사전 확인
      - name: Verify secrets
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "❌ Secret 'GPG_PRIVATE_KEY' is not set"
            exit 1
          fi
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "❌ Secret 'GPG_PASSPHRASE' is not set"
            exit 1
          fi
          if [ -z "$CENTRAL_TOKEN" ]; then
            echo "❌ Secret 'CENTRAL_TOKEN' is not set"
            exit 1
          fi
          echo "✅ All required secrets are present"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
          CENTRAL_TOKEN:   ${{ secrets.CENTRAL_TOKEN }}

      # 서명된 아티팩트를 build/staging 디렉토리에 생성
      - name: Publish to staging
        run: ./gradlew publishMavenJavaPublicationToStagingRepository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}

      # staging 디렉토리를 ZIP으로 묶기
      - name: Bundle artifacts
        run: |
          cd build/staging
          zip -r ../../bundle.zip .
          echo "Bundle contents:"
          unzip -l ../../bundle.zip

      # bundle.zip 존재 및 내용 확인
      - name: Verify bundle
        run: |
          echo "=== bundle.zip location ==="
          ls -lh bundle.zip
          echo "=== bundle.zip contents ==="
          unzip -l bundle.zip

      # Central Portal API로 업로드 (USER_MANAGED: 수동 검토 후 배포)
      - name: Upload to Maven Central
        run: |
          echo "=== Token prefix (first 8 chars) ==="
          echo "$CENTRAL_TOKEN" | cut -c1-8
          echo "=== Token length ==="
          echo -n "$CENTRAL_TOKEN" | wc -c
          HTTP_CODE=$(curl --verbose --show-error \
            --http1.1 \
            --write-out "%{http_code}" \
            --output response.txt \
            --dump-header response-headers.txt \
            --request POST \
            --header "Authorization: Bearer $CENTRAL_TOKEN" \
            --form bundle=@bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=USER_MANAGED&name=secure-prompt-${{ github.ref_name }}")
          echo "HTTP Status: $HTTP_CODE"
          echo "=== Response Headers ==="
          cat response-headers.txt
          echo "=== Response Body ==="
          cat response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          DEPLOYMENT_ID=$(cat response.txt)
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
        env:
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}

      - name: Summary
        run: |
          echo "## Maven Central 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **버전**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID**: ${{ env.DEPLOYMENT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **상태**: central.sonatype.com 에서 수동으로 Publish 버튼을 클릭하세요" >> $GITHUB_STEP_SUMMARY
          echo "- **확인 주소**: https://central.sonatype.com/publishing/deployments" >> $GITHUB_STEP_SUMMARY
